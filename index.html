<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1320" />
  <meta name="description" content="Langla — a Bangla learning app for hosting in-laws in August." />
  <title>Langla</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Langla</div>
      <div class="topbar-streak" id="topbar-streak" title="Current streak">🔥 0</div>
    </header>
    <main id="view" class="view" aria-live="polite">
      <div class="loading">Loading…</div>
    </main>
    <nav class="tabbar" role="navigation">
      <a class="tab" href="#/" data-tab="home">
        <span class="tab-icon">●</span>
        <span class="tab-label">Today</span>
      </a>
      <a class="tab" href="#/review" data-tab="review">
        <span class="tab-icon">▣</span>
        <span class="tab-label">Review</span>
      </a>
      <a class="tab" href="#/chapters" data-tab="chapters">
        <span class="tab-icon">≡</span>
        <span class="tab-label">Chapters</span>
      </a>
      <a class="tab" href="#/notepad" data-tab="notepad">
        <span class="tab-icon">✎</span>
        <span class="tab-label">Notepad</span>
      </a>
    </nav>
  </div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
